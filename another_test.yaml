AWSTemplateFormatVersion: '2010-09-09'
Description: Root CloudFormation template.
Resources:
  MyFuckingEC2Instance: #name of the resource
    Type: AWS::EC2::Instance #type of the resource
    Properties:
      ImageId: ami-0ac0e4288aa341886 #Amazon Linux 2 AMI
      InstanceType: t2.micro
      Tags:
        - Key: Name
          Value: MyFuckingEC2Instance
Outputs:
  EC2InstanceId:
    Description: The ID of the newly created EC2 instance.
    Value:
      Ref: MyFuckingEC2Instance